<hr>
<h2 class="text-center mb-3 mt-5">Type - 2</h2>
<h2 class="text-center mb-5 mt-5">Task-1</h2>

<ul class="nav nav-pills">
    <li *ngFor="let tab of tabsArr" class="nav-item">
        <a href="javascript:;" [ngClass]="{
        active : selectedSkill.toLowerCase().includes(tab.frameWorkName)
    }" class="nav-link"
            (click)="onTabChange(tab.frameWorkName)">
            {{tab.tabTitle}}
        </a>
    </li>
</ul>

<hr>

<div class="card">
    <ng-container *ngFor="let tab of tabsArr; trackby: trackByFun">
        <div class="card-body" [innerHTML]="tab.tabContent"
            *ngIf="selectedSkill.toLowerCase().includes(tab.frameWorkName)">
        </div>
    </ng-container>
</div>
